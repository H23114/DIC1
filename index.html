<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Hui Shan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="glass-container">
        <div class="content">
            <h2 class="greeting">Hello, I'm</h2>
            <h1 class="name">Hong Hui Shan</h1>
            <div class="divider"></div>
            <div class="time-widget">
                <div class="time-label">Current Local Time</div>
                <div class="time-display" id="clock">00:00:00</div>
                <div class="date-display" id="date">Loading date...</div>
            </div>
        </div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();

            // Format time: HH:MM:SS AM/PM
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            // the hour '0' should be '12'
            hours = hours ? hours : 12;

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            const timeString = `${hours}:${minutes}:${seconds} <span class="ampm">${ampm}</span>`;
            document.getElementById('clock').innerHTML = timeString;

            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>

</html>
